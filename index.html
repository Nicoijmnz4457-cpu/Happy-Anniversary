<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Happy Anniversary ❤️</title>

<style>

/* ================= BASE ================= */
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #0b0014;
    color: white;
    text-align: center;
}

/* ================= STAR LAYER ================= */
#stars {
    position: fixed;
    inset: 0;
    z-index: 0;
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
}

/* ================= FINAL AURORA BACKGROUND ================= */
#finalGlow {
    position: fixed;
    inset: 0;
    z-index: 1;
    opacity: 0;
    transition: opacity 2s ease;
    pointer-events: none;

    background: radial-gradient(circle at 20% 30%, rgba(255, 120, 180, 0.35), transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(120, 200, 255, 0.25), transparent 45%),
                radial-gradient(circle at 50% 80%, rgba(255, 255, 255, 0.12), transparent 50%),
                linear-gradient(120deg, #0b0014, #1a0033, #12001f);

    animation: auroraPulse 6s ease-in-out infinite;
}

#finalGlow.show {
    opacity: 1;
}

@keyframes auroraPulse {
    0% { filter: brightness(1); }
    50% { filter: brightness(1.3); }
    100% { filter: brightness(1); }
}

/* ================= COMET CANVAS ================= */
#cometCanvas {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1s ease;
}

#cometCanvas.show {
    opacity: 1;
}

/* ================= CONTENT ================= */
.container {
    position: relative;
    z-index: 5;
    padding: 20px;
    padding-top: env(safe-area-inset-top);
}

/* ================= INTRO ================= */
#intro {
    position: fixed;
    inset: 0;
    background: black;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    animation: fadeOut 2.5s ease forwards;
    animation-delay: 2.5s;
}

#intro h1, #intro p {
    opacity: 0;
    animation: fadeIn 1.5s ease forwards;
}

#intro p { animation-delay: 0.8s; }

@keyframes fadeIn { to { opacity: 1; } }
@keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

/* ================= UI ================= */
button {
    padding: 15px 25px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    font-size: 1rem;
}

/* ================= FINAL PHOTO ================= */
#finalPhoto {
    width: 260px;
    border-radius: 20px;
    margin-top: 20px;
    opacity: 0;
    transform: scale(0.8);
    transition: 1.5s ease;
    z-index: 10;
}

#finalPhoto.show {
    opacity: 1;
    transform: scale(1);
}

#loveText {
    font-size: 2em;
    opacity: 0;
    transition: 1s ease;
}

#loveText.show {
    opacity: 1;
}

</style>
</head>

<body>

<div id="stars"></div>
<div id="finalGlow"></div>

<canvas id="cometCanvas"></canvas>

<div id="intro">
    <h1>For You ❤️</h1>
    <p>A small experience… made with love</p>
</div>

<div class="container">

    <h1>Happy Anniversary ❤️</h1>

    <button onclick="showLoading()">Open Surprise 💌</button>

    <div id="loadingScreen">
        <div id="finalMessage"></div>
        <img id="finalPhoto" src="photo.jpg">
        <div id="loveText">I love you ❤️</div>
    </div>

</div>

<script>

/* ================= STARS ================= */
const starContainer = document.getElementById("stars");
const stars = [];

const STAR_COUNT = 120;
const CENTER = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

function createStars() {
    for (let i = 0; i < STAR_COUNT; i++) {
        let star = document.createElement("div");
        star.className = "star";

        let x = Math.random() * window.innerWidth;
        let y = Math.random() * window.innerHeight;

        star.style.left = x + "px";
        star.style.top = y + "px";

        starContainer.appendChild(star);

        stars.push({
            el: star,
            x, y,
            vx: 0,
            vy: 0
        });
    }
}
createStars();

/* ================= COMETS ================= */
const canvas = document.getElementById("cometCanvas");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let comets = [];

function createComet() {
    return {
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height * 0.5,
        vx: 6 + Math.random() * 4,
        vy: 6 + Math.random() * 4,
        len: 120 + Math.random() * 80,
        hue: 300 + Math.random() * 60
    };
}

function drawComets() {
    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    comets.forEach(c => {

        let grad = ctx.createLinearGradient(c.x, c.y, c.x - c.len, c.y - c.len);

        grad.addColorStop(0, `hsla(${c.hue},100%,80%,1)`);
        grad.addColorStop(1, "transparent");

        ctx.strokeStyle = grad;
        ctx.lineWidth = 2;

        ctx.beginPath();
        ctx.moveTo(c.x, c.y);
        ctx.lineTo(c.x - c.len, c.y - c.len);
        ctx.stroke();

        c.x += c.vx;
        c.y += c.vy;

        if (c.x > canvas.width || c.y > canvas.height) {
            Object.assign(c, createComet());
        }
    });

    requestAnimationFrame(drawComets);
}

/* ================= STAR COLLAPSE ================= */
function collapseStarsToPhoto() {
    const rect = document.getElementById("finalPhoto").getBoundingClientRect();

    const targetX = rect.left + rect.width / 2;
    const targetY = rect.top + rect.height / 2;

    stars.forEach(s => {
        let dx = targetX - s.x;
        let dy = targetY - s.y;

        s.vx = dx * 0.02;
        s.vy = dy * 0.02;
    });

    function animate() {
        stars.forEach(s => {
            s.x += s.vx;
            s.y += s.vy;

            s.el.style.left = s.x + "px";
            s.el.style.top = s.y + "px";
            s.el.style.opacity *= 0.98;
        });

        requestAnimationFrame(animate);
    }

    animate();
}

/* ================= MAIN ================= */
function showLoading() {
    typeWriter();
}

function typeWriter() {
    const text = "You unlocked my final message ❤️\n\nI’d choose you in every lifetime.";
    const box = document.getElementById("finalMessage");

    let i = 0;

    function type() {
        if (i < text.length) {
            box.innerHTML += text[i] === "\n" ? "<br>" : text[i];
            i++;
            setTimeout(type, 40);
        } else {
            showFinal();
        }
    }
    type();
}

/* ================= FINAL SEQUENCE ================= */
function showFinal() {

    const img = document.getElementById("finalPhoto");
    const love = document.getElementById("loveText");
    const glow = document.getElementById("finalGlow");

    img.classList.add("show");

    setTimeout(() => {
        love.classList.add("show");

        glow.classList.add("show");

        canvas.classList.add("show");

        comets = Array.from({ length: 6 }, createComet);

        drawComets();

        collapseStarsToPhoto();

    }, 1200);
}

</script>

</body>
</html>
