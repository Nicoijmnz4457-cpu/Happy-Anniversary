<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Happy Anniversary ❤️</title>

<style>

/* ================= BASE ================= */
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow-x: hidden;
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg, #ff9a9e, #fad0c4);
    color: white;
    text-align: center;
}

/* ================= STAR BACKGROUND ================= */
#stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
}

.star {
    position: absolute;
    width: 3px;
    height: 3px;
    background: white;
    border-radius: 50%;
    opacity: 0.6;
    animation: floatStar linear infinite;
}

@keyframes floatStar {
    from { transform: translateY(100vh); opacity: 0; }
    to { transform: translateY(-10vh); opacity: 1; }
}

/* ================= COMET CANVAS ================= */
#cometCanvas {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1s ease;
}

#cometCanvas.show {
    opacity: 1;
}

/* ================= CONTENT ================= */
.container {
    position: relative;
    z-index: 2;
    padding: 20px;
    padding-top: env(safe-area-inset-top);
}

/* ================= INTRO ================= */
#intro {
    position: fixed;
    inset: 0;
    background: black;
    z-index: 3000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    animation: fadeOut 2.5s ease forwards;
    animation-delay: 2.5s;
}

#intro h1, #intro p {
    opacity: 0;
    animation: fadeIn 1.5s ease forwards;
}

#intro p { animation-delay: 0.8s; }

@keyframes fadeIn { to { opacity: 1; } }
@keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

/* ================= UI ================= */
h1 { font-size: 2.5em; }

p {
    font-size: 1.2em;
    max-width: 600px;
    margin: 20px auto;
}

button {
    padding: 15px 25px;
    font-size: 1.1em;
    border: none;
    border-radius: 30px;
    background: white;
    color: #ff6b81;
    cursor: pointer;
}

.hidden { display: none; }

input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    text-align: center;
}

/* ================= HEARTS ================= */
.heart {
    position: fixed;
    color: red;
    animation: float 5s linear infinite;
    z-index: 5;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}

/* ================= LOADING ================= */
#loadingScreen {
    position: fixed;
    inset: 0;
    background: #ff6b81;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
}

#loadingScreen.show {
    opacity: 1;
    pointer-events: all;
}

#progressContainer {
    width: 60%;
    height: 10px;
    background: rgba(255,255,255,0.3);
    border-radius: 20px;
    margin-top: 20px;
    overflow: hidden;
}

#progressBar {
    width: 0%;
    height: 100%;
    background: white;
}

/* ================= FINAL ================= */
#finalMessage {
    font-size: 1.4em;
    margin-top: 20px;
    max-width: 700px;
}

#finalPhoto {
    width: 260px;
    border-radius: 20px;
    margin-top: 20px;
    opacity: 0;
    transform: scale(0.9);
    transition: all 1.5s ease;
}

#finalPhoto.show {
    opacity: 1;
    transform: scale(1);
}

#loveText {
    font-size: 2em;
    margin-top: 15px;
    opacity: 0;
    transition: 1s ease;
}

#loveText.show {
    opacity: 1;
}

</style>
</head>

<body>

<!-- ⭐ STARS -->
<div id="stars"></div>

<!-- 🌠 COMETS -->
<canvas id="cometCanvas"></canvas>

<!-- INTRO -->
<div id="intro">
    <h1>For You ❤️</h1>
    <p>A small experience… made with love</p>
</div>

<div class="container">

    <h1>Happy Anniversary ❤️</h1>
    <p>Click below for a surprise...</p>

    <button onclick="showMessage(); vibrate(30);">Open My Heart 💌</button>

    <div id="message" class="hidden">

        <p>
            From the moment we met, my world became brighter.  
            Happy Anniversary ❤️  
        </p>

        <button onclick="startGame(); vibrate(40);">Play a Secret Game 🎮</button>

        <div id="game" class="hidden">
            <p id="question">Where did we first meet? 💭</p>
            <input type="text" id="answer">
            <br><br>
            <button onclick="checkAnswer(); vibrate(50);">Submit</button>
            <p id="gameResponse"></p>
        </div>

    </div>
</div>

<!-- LOADING -->
<div id="loadingScreen">
    <p id="loadingText">Unlocking your final message... ❤️</p>

    <div id="progressContainer">
        <div id="progressBar"></div>
    </div>

    <div id="finalMessage"></div>

    <img id="finalPhoto" src="photo.jpg" alt="Memory ❤️">

    <div id="loveText">I love you ❤️</div>
</div>

<script>

/* ================= STARS ================= */
const starContainer = document.getElementById("stars");

for (let i = 0; i < 70; i++) {
    let s = document.createElement("div");
    s.className = "star";
    s.style.left = Math.random() * 100 + "vw";
    s.style.top = Math.random() * 100 + "vh";
    s.style.animationDuration = (Math.random() * 6 + 4) + "s";
    starContainer.appendChild(s);
}

/* ================= COMETS (GLOWING TAILS) ================= */
const canvas = document.getElementById("cometCanvas");
const ctx = canvas.getContext("2d");

let w, h;
function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

let comets = [];

function createComet() {
    return {
        x: Math.random() * w,
        y: Math.random() * h * 0.5,
        vx: Math.random() * 6 + 4,
        vy: Math.random() * 6 + 4,
        len: Math.random() * 120 + 80,
        hue: Math.random() * 60 + 300 // pink/purple glow
    };
}

function drawComets() {
    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.fillRect(0, 0, w, h);

    comets.forEach(c => {
        let grad = ctx.createLinearGradient(c.x, c.y, c.x - c.len, c.y - c.len);

        grad.addColorStop(0, `hsla(${c.hue},100%,80%,1)`);
        grad.addColorStop(0.4, `hsla(${c.hue},100%,70%,0.6)`);
        grad.addColorStop(1, "rgba(255,255,255,0)");

        ctx.strokeStyle = grad;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(c.x, c.y);
        ctx.lineTo(c.x - c.len, c.y - c.len);
        ctx.stroke();

        // glow head
        ctx.beginPath();
        ctx.fillStyle = `hsla(${c.hue},100%,85%,1)`;
        ctx.shadowBlur = 20;
        ctx.shadowColor = `hsla(${c.hue},100%,70%,1)`;
        ctx.arc(c.x, c.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        c.x += c.vx;
        c.y += c.vy;

        if (c.x > w || c.y > h) {
            Object.assign(c, createComet());
        }
    });

    requestAnimationFrame(drawComets);
}

function startComets() {
    canvas.classList.add("show");
    for (let i = 0; i < 7; i++) {
        comets.push(createComet());
    }
    drawComets();
}

/* ================= MAIN ================= */
function vibrate(ms) {
    if (navigator.vibrate) navigator.vibrate(ms);
}

function showMessage() {
    document.getElementById("message").classList.remove("hidden");
}

function startGame() {
    document.getElementById("game").classList.remove("hidden");
}

function checkAnswer() {
    const val = document.getElementById("answer").value.toLowerCase();
    const res = document.getElementById("gameResponse");
    const q = document.getElementById("question");

    if (val.includes("fortnite")) {
        q.innerHTML = "What was our first date? 🌙";
        res.innerHTML = "Correct ❤️";
        showLoading();
    } else {
        res.innerHTML = "Try again 😄";
    }
}

/* ================= LOADING ================= */
function showLoading() {
    const load = document.getElementById("loadingScreen");
    const bar = document.getElementById("progressBar");

    load.classList.add("show");

    let p = 0;
    let interval = setInterval(() => {
        p += 2;
        bar.style.width = p + "%";

        if (p >= 100) {
            clearInterval(interval);
            typeWriter();
        }
    }, 25);
}

/* ================= TYPE ================= */
function typeWriter() {
    const text = "You unlocked my final message ❤️\n\nI’d choose you in every lifetime.";
    const box = document.getElementById("finalMessage");

    let i = 0;
    function type() {
        if (i < text.length) {
            box.innerHTML += text[i] === "\n" ? "<br>" : text[i];
            i++;
            setTimeout(type, 40);
        } else {
            showPhoto();
        }
    }
    type();
}

/* ================= FINAL REVEAL ================= */
function showPhoto() {
    const img = document.getElementById("finalPhoto");
    const love = document.getElementById("loveText");

    setTimeout(() => {
        img.classList.add("show");
        vibrate(120);
    }, 300);

    setTimeout(() => {
        love.classList.add("show");
        vibrate([80, 50, 80]);

        // 🌠 START COMETS HERE
        startComets();

    }, 1500);
}

</script>

</body>
</html>
